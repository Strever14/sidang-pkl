<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Penilaian Sidang</title>
<style>
/* ... (Style tetap sama seperti sebelumnya) ... */
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.container { width: 100%; max-width: 420px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.header-section { text-align: center; margin-bottom: 25px; }
h2 { margin: 0; color: #2c3e50; font-size: 24px; }
.description { color: #7f8c8d; font-size: 14px; margin-top: 10px; line-height: 1.5; }
label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #34495e; }
select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #dcdde1; font-size: 14px; background-color: #fff; transition: border 0.3s; }
select:focus { border-color: #2d89ef; outline: none; }
button { width: 100%; padding: 14px; background: #2d89ef; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s ease; }
button:hover { background: #1b5fbf; }
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: #bdc3c7; }
</style>
</head>

<body>
<div class="container">
  <div class="header-section">
    <h2>Sistem Penilaian</h2>
    <p class="description">
      Selamat datang di Portal Penilaian Sidang. <br>
      Silakan pilih penguji 1 dan penguji 2 untuk memulai proses penilaian.
    </p>
  </div>

  <label for="guru1">Nama Penguji 1</label>
  <select id="guru1"></select>

  <label for="guru2">Nama Penguji 2</label>
  <select id="guru2"></select>
  
  <button onclick="login()">Masuk ke Sistem</button>

  <div class="footer">
    &copy; 2026 - Manajemen Penilaian Internal
  </div>
</div>

<script>
const API_KEY = "AIzaSyBhLPNX7e0sA8VIy_jlvBKzl1qHYURHDnY"; //
const SHEET_ID = "1V6RrI1uPQ7s8udusfBe0ynEe5MzOHjHS7gWuZUMP55I"; //

async function loadPenguji() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/daftarPenguji!A2:B13?key=${API_KEY}`; //
    const res = await fetch(url);
    const data = await res.json();

    const select1 = document.getElementById("guru1");
    const select2 = document.getElementById("guru2");
    
    const options = "<option value=''>-- Pilih Nama Penguji --</option>";
    select1.innerHTML = options;
    select2.innerHTML = options;

    if (data.values) {
      data.values.forEach(row => {
        const opt = `<option value="${row[1]}">${row[1]}</option>`; //
        select1.innerHTML += opt;
        select2.innerHTML += opt;
      });
    }
  } catch (error) {
    console.error("Gagal memuat data penguji:", error);
  }
}

function login() {
  const guru1 = document.getElementById("guru1").value;
  const guru2 = document.getElementById("guru2").value;

  if (!guru1 || !guru2) return alert("Pilih kedua penguji terlebih dahulu!");
  if (guru1 === guru2) return alert("Penguji 1 dan Penguji 2 tidak boleh orang yang sama!");

  // Simpan kedua penguji ke localStorage
  localStorage.setItem("guru1", guru1); //
  localStorage.setItem("guru2", guru2);
  
  window.location.href = "pilih.html"; //
}

loadPenguji();
</script>
</body>
</html>
