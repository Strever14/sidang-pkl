<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Siswa - Sistem Penilaian</title>
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 420px;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* HEADER & DESKRIPSI */
.header-section {
  text-align: center;
  margin-bottom: 25px;
}

h2 {
  margin: 0;
  color: #2c3e50;
  font-size: 22px;
}

.description {
  color: #7f8c8d;
  font-size: 14px;
  margin-top: 10px;
  line-height: 1.5;
}

/* LABEL & INPUT */
label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: bold;
  color: #34495e;
}

select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #dcdde1;
  font-size: 14px;
  background-color: #fff;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: #2d89ef;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
  margin-top: 10px;
}

button:hover {
  background: #1b5fbf;
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #bdc3c7;
}
</style>
</head>

<body>

<div class="container">
  <div class="header-section">
    <h2>Pilih Siswa</h2>
    <p class="description">
      Silakan filter berdasarkan kelas terlebih dahulu, lalu pilih nama siswa yang akan diuji untuk melanjutkan ke form penilaian.
    </p>
  </div>

  <label>Filter Kelas</label>
  <select id="kelas" onchange="filterSiswa()">
    <option value="">-- Pilih Kelas --</option>
    <option>XII TJKT 1</option>
    <option>XII TJKT 2</option>
    <option>XII TJKT 3</option>
    <option>XII AKL</option>
  </select>

  <label>Nama Siswa</label>
  <select id="siswa">
    <option value="">Pilih Siswa</option>
  </select>
  
  <button onclick="lanjut()">Lanjut ke Penilaian</button>

  <div class="footer">
    Pastikan data siswa sudah sesuai sebelum lanjut.
  </div>
</div>

<script>
const API_KEY = "AIzaSyBhLPNX7e0sA8VIy_jlvBKzl1qHYURHDnY";
const SHEET_ID = "1V6RrI1uPQ7s8udusfBe0ynEe5MzOHjHS7gWuZUMP55I";

let semuaSiswa = [];

async function loadSiswa() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/listsiswa!A2:F115?key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.values) {
      semuaSiswa = data.values.map(row => ({
        no_peserta: row[0], // Kolom A: nomer peserta
        nama: row[1],       // Kolom B: nama
        kelas: row[4],      // Kolom E: kelas
        link: row[5]        // Kolom F: link ppt
      }));
    }
  } catch (e) {
    console.error("Gagal memuat data:", e);
  }
}

function filterSiswa() {
  const kelas = document.getElementById("kelas").value;
  const select = document.getElementById("siswa");

  select.innerHTML = "<option value=''>-- Pilih Siswa --</option>";

  const filtered = semuaSiswa.filter(s => s.kelas === kelas);
  
  filtered.forEach((s) => {
    // Gunakan no_peserta sebagai value agar unik
    select.innerHTML += `<option value="${s.no_peserta}">${s.nama}</option>`;
  });
}

function lanjut() {
  const noPeserta = document.getElementById("siswa").value;
  if (!noPeserta) return alert("Pilih siswa terlebih dahulu!");

  // Cari data lengkap berdasarkan no_peserta
  const dataSiswa = semuaSiswa.find(s => s.no_peserta === noPeserta);
  
  localStorage.setItem("siswa", JSON.stringify(dataSiswa));
  window.location.href = "nilai.html";
}

loadSiswa();
</script>
</body>
</html>
